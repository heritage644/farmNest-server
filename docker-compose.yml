version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"  # This lets your computer see Redis (Optional)

  web-app:
    build: .
    container_name: my-custom-app
    ports:
      - "3000:3000"  # <--- CRUCIAL: Maps port 3000 of the container to port 3000 of your laptop
    depends_on:
      - redis
    env_file:
      - .env  
    environment:
      - REDIS_HOST=redis